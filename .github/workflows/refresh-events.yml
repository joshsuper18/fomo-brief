name: Refresh FOMO Events

on:
  schedule:
    - cron: '5 * * * *'    # 5 minutes past every hour
    - cron: '0 14 * * *'   # 6am PT daily — morning guarantee with search fallback
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install parallel-cli
        run: pip install parallel-web-tools

      - name: Fetch monitor events and refresh HTML
        env:
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
        run: python3 .github/scripts/refresh_events.py

      - name: Commit and deploy if changed
        id: deploy
        run: |
          cp fomo-brief.html index.html
          git config user.name  "fomo-refresh[bot]"
          git config user.email "fomo-refresh[bot]@users.noreply.github.com"
          git add fomo-brief.html index.html
          if git diff --staged --quiet; then
            echo "No new events — nothing to commit"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-refresh REAL_EVENTS from monitors [skip ci]"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Slack morning confirmation (6am PT run only)
        if: github.event.schedule == '0 14 * * *' || github.event_name == 'workflow_dispatch'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No SLACK_WEBHOOK_URL secret set — skipping"
            exit 0
          fi
          if [ "${{ steps.deploy.outputs.updated }}" = "true" ]; then
            MSG="✅ *fomo-brief morning refresh done* — new events deployed from monitors/search. https://josh-parallel.github.io/fomo-brief/"
          else
            MSG="ℹ️ *fomo-brief morning refresh* — no new events found, existing feed unchanged. https://josh-parallel.github.io/fomo-brief/"
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MSG\"}"
